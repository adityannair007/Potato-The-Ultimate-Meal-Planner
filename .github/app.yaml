apiVersion: apps/v1
kind: Deployment
metadata:
  name: potato-app
  namespace: potato-local
spec:
  selector:
    matchLabels:
      app: potato-app
  template:
    metadata:
      labels:
        app: potato-app
    spec:
      containers:
        - name: potato-app
          image: potato-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: potato-config
            - secretRef:
                name: potato-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: potato-app
  namespace: potato-local
spec:
  type: NodePort
  selector:
    app: potato-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
